<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcular X e Y Dois</title>
</head>

<body style="background-color: aqua;">

    <h1>Programa para somar X = 3 e Y = 4</h1>
    <label for="inputA">Coloque o número 3 no X</label>
    <input type="number" name="inputA" id="inputA">
    <br>
    <label for="inputB">Coloque o número 4 no Y</label>
    <input type="number" name="inputB" id="inputB">
    <br>
    <input type="button" name="calcular" id="calcular" value="Somar" onclick="funcaoCalcular()">
    <br>
    <span id="resposta">O resultado da soma é</span>

    <script>



        function funcaoCalcular() {
            // alert("o clicar funcionou")
            let valorA = parseFloat(document.getElementById("inputA").value);
            let valorB = valorA +parseFloat(document.getElementById("inputB").value);

            let k = valorA ** 3 * valorB + 7;
            
            document.getElementById("resposta").innerHTML = " O valor de K é " + k;
            console.log( " O valor de k é " + k);
        }
    </script>
</body>

</html>
