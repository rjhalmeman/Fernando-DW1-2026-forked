<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Formulário Simples</title>
</head>

<body>

    <h1>Cadastro de Usuário</h1>

    <form action="AutorizacaoAtleta.html" method="GET" onsubmit="return validarFormulario()">

        <label for="nome">Nome completo:</label>
        <input type="text" id="nome" name="nome" required>
        <br><br>
        <label for="cpf">CPF (apenas números):</label>
        <input type="text" id="cpf" name="cpf" required>
        <br><br>
        <label for="idade">Idade (em anos, não meses):</label>
        <input type="number" id="idade" name="idade" required>
        <br><br>
        <label for="acomp">Nome do responsável / acompanhante:</label>
        <input type="text" id="acomp" name="acomp" required>
        <br><br>
        <label for="origem">Cidade de Origem:</label>
        <input type="text" id="origem" name="origem" required>
        <br><br>
        <label for="destino">Cidade de Destino:</label>
        <input type="text" id="destino" name="destino" required>
        <br><br>

        <label for="esporte">Modalidade esportiva:</label>
        <select id="esporte" name="esporte">
            <option value="futebol">Futebol</option>
            <option value="volei">Vôlei</option>
            <option value="natacao">Natação</option>
        </select>

        <br><br>
        <button type="submit">Enviar Dados</button>
    </form>

<script>
function validarFormulario() {
    var cpf = document.getElementById('cpf').value;
    var idade = parseInt(document.getElementById('idade').value);
    var categoria = "";

    if (cpf.length != 11) {
        alert("CPF inválido");
        return false;
    }

    if (idade < 7) {
        alert("Idade insuficiente");
        return false;
    }

    if (idade <= 11) {
        categoria = "Infantil";
    } else if (idade <= 13) {
        categoria = "Pré-Adolescente";
    } else if (idade <= 18) {
        categoria = "Adolescente";
    } else {
        alert("Maior de idade não permitido");
        return false;
    }

    // 🔥 Aqui está o segredo
    document.getElementById('categoria').value = categoria;

    return true;
}
</script>

</body>

</html>
