<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Dados Recebidos</title>
</head>

<body>

    <h1>Dados Recebidos com Sucesso!</h1>

    <p><strong>Nome informado:</strong> <span id="resultadoNome"></span></p>
    <p><strong>CPF informado:</strong> <span id="resultadoCpf"></span></p>
    <p><strong>Idade informada:</strong> <span id="resultadoIdade"></span></p>
    <p><strong>Nome do(a) responsável informado:</strong> <span id="resultadoResponsa"></span></p>
    <p><strong>Cidade de Origem informado:</strong> <span id="resultadoOrigem"></span></p>
    <p><strong>Cidade de Destino informado:</strong> <span id="resultadoDestino"></span></p>
    <p><strong>Modalidade escolhida:</strong> <span id="resultadoModali"></span></p>
    <p><strong>Categoria selecionada: </strong> <span id="resultadoCategoria"></span></p>

<script>
var params = new URLSearchParams(window.location.search);

document.getElementById('resultadoNome').textContent = params.get('nome');
document.getElementById('resultadoCpf').textContent = params.get('cpf');
document.getElementById('resultadoIdade').textContent = params.get('idade');
document.getElementById('resultadoResponsa').textContent = params.get('acomp');
document.getElementById('resultadoOrigem').textContent = params.get('origem');
document.getElementById('resultadoDestino').textContent = params.get('destino');
document.getElementById('resultadoModali').textContent = params.get('esporte');
document.getElementById('resultadoCategoria').textContent = params.get('categoria');

// Botão voltar
document.getElementById('btnVoltar').onclick = function() {
    window.location.href = "indexAtleta.html";
};
</script>

    <br>
    <a href="indexAtleta.html">Voltar para o formulário</a>


</body>

</html>
