<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Enviar Imagem e Mensagens</title>
    <link rel="stylesheet" href="clienteRA.js">
</head>

<body>

    <div class="container">
        <h1>Configurações de Conexão</h1>
        <label for="enderecoServidorInput">Endereço do Servidor:</label>
        <input type="text" id="enderecoServidorInput" placeholder="Digite o endereço do servidor" value="localhost">

        <label for="inputPorta">Porta:</label>
        <input type="text" id="inputPorta" placeholder="Digite a porta" value="3000">

        <hr>

 

        <h2>Coloque a suas informações da UTF</h2>
        <label for="inputRA">RA:</label>
        <input type="text" id="inputRA"><br>
<br>
        <label for="inputNOME">Seu nome:</label>
        <input type="text" id="inputNOME"><br>
<br>
        <label for="inputNOTA1">Nota do 1º bim:</label>
        <input type="number" id="inputNOTA1"><br>
        <label for="inputNOTA2">Nota do 2º bim:</label>
        <input type="number" id="inputNOTA2"><br>
        <label for="inputNOTA3">Nota do 3º bim:</label>
        <input type="number" id="inputNOTA3"><br>
        <label for="inputNOTA4">Nota do 4º bim:</label>
        <input type="number" id="inputNOTA4"><br>
<br>
        <label for="inputImagemFoto">Selecione a Foto:</label>
        <input type="file" id="inputImagemFoto" accept="image/*" onchange="mostrarPreview(event)">

        <div class="preview-container">
            <img id="previewImagem" alt="Preview da Imagem Escolhida">
        </div>
<br>
        <button type="button" onclick="enviarImagemAlemDeNotas()">Enviar Foto</button>

        <div id="respostaNota" class="resposta">Favor inserir suas notas e dados.</div>

        <hr>

       <h2>Envie uma Imagem para o servidor</h2>
        <label for="inputImagem">Selecione a Imagem:</label>
        <input type="file" id="inputImagem" accept="image/*" onchange="mostrarPreview(event)">

        <div class="preview-container">
            <img id="previewImagem" alt="Preview da Imagem Escolhida">
        </div>

        <button type="button" onclick="enviarImagem()">Enviar Imagem</button>

        <h3>Resposta do servidor (Upload)</h3>
        <div id="respostaImagem" class="resposta">Nenhum arquivo enviado ainda.</div>

        <hr>

        <h2>Calcular Hipotenusa</h2>
        <label for="inputCateto1">Cateto 1:</label>
        <input type="text" id="inputCateto1" placeholder="Digite o valor do cateto 1">

        <label for="inputCateto2">Cateto 2:</label>
        <input type="text" id="inputCateto2" placeholder="Digite o valor do cateto 2">

        <button type="button" onclick="enviarMensagem()">Calcular</button>

        <h3>Resposta do servidor (Pitágoras)</h3>
        <div id="respostaDoServidor" class="resposta">Nenhum cálculo realizado ainda.</div>
    </div>

    <script>
        // Nova função que lê o arquivo local e exibe na tela antes/depois do upload
        function mostrarPreview(event) {
            const input = event.target;
            const preview = document.getElementById('previewImagem');

            if (input.files && input.files[0]) {
                const reader = new FileReader();

                // Quando o navegador terminar de processar a imagem localmente, define o src
                reader.onload = function (e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block'; // Torna a imagem visível
                }

                reader.readAsDataURL(input.files[0]);
            } else {
                preview.src = '';
                preview.style.display = 'none';
            }
        }

        // --- FUNÇÃO PARA ENVIAR IMAGEM ---
        async function enviarImagemAlemDeNotas() {
            const enderecoServidor = document.getElementById('enderecoServidorInput').value;
            const porta = document.getElementById('inputPorta').value;
            const inputImagem = document.getElementById('inputImagem');
            const respostaDiv = document.getElementById("respostaImagem");

            if (inputImagem.files.length === 0) {
                respostaDiv.className = "resposta aviso"; // Classe amarela
                respostaDiv.innerHTML = "Por favor, selecione uma imagem primeiro!";
                return;
            }
            
            const arquivoImagem = inputImagem.files[0];
            const formData = new FormData();
            formData.append('foto', arquivoImagem);

            try {
                respostaDiv.className = "resposta";
                respostaDiv.innerHTML = "Enviando arquivo...";

                const response = await fetch(`http://${enderecoServidor}:${porta}/enviar-imagem`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Falha na resposta do servidor');
                }

                const data = await response.json();

                // Define a classe de sucesso (Verde) e atualiza o texto permanentemente
                respostaDiv.className = "resposta sucesso";
                respostaDiv.innerHTML = `<b>${data.mensagem}</b><br>Salvo no servidor como: <i>${data.nomeArquivo}</i>`;

            } catch (error) {
                console.error('Erro:', error);
                // Define a classe de erro (Vermelho)
                respostaDiv.className = "resposta erro";
                respostaDiv.innerHTML = "Erro de comunicação: Não foi possível salvar a imagem no servidor.";
            }
        }

        // --- FUNÇÃO DE PITÁGORAS ---
        async function enviarMensagem() {
            const enderecoServidor = document.getElementById('enderecoServidorInput').value;
            const porta = document.getElementById('inputPorta').value;
            const respostaDiv = document.getElementById("respostaDoServidor");

            const c1 = parseFloat(document.getElementById('inputCateto1').value);
            const c2 = parseFloat(document.getElementById('inputCateto2').value);

            if (isNaN(c1) || isNaN(c2)) {
                respostaDiv.className = "resposta aviso"; // Amarelo
                respostaDiv.innerHTML = "Por favor, insira valores numéricos válidos nos dois catetos.";
                return;
            }

            const meuPacoteDeDados = { x: c1, y: c2 };

            try {
                respostaDiv.className = "resposta";
                respostaDiv.innerHTML = "Processando cálculo...";

                const response = await fetch(`http://${enderecoServidor}:${porta}/enviar-mensagem`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(meuPacoteDeDados),
                });

                const data = await response.text();
                const { hipotenusa } = JSON.parse(data);

                respostaDiv.className = "resposta sucesso"; // Verde
                respostaDiv.innerHTML = "Cálculo concluído! A hipotenusa é: <b>" + hipotenusa + "</b>";
            } catch (error) {
                console.error('Erro:', error);
                respostaDiv.className = "resposta erro"; // Vermelho
                respostaDiv.innerHTML = "Erro ao se comunicar com o servidor para calcular a hipotenusa.";
            }
        }
    </script>
</body>

</html>
